name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-skills-consistency:
    name: validate-skills-consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install development validators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          npm ci

      - name: Lint Markdown
        run: npm run lint:markdown

      - name: Lint YAML
        run: python -m yamllint .

      - name: Type-check Python
        run: python -m mypy

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Render managed skills
        shell: pwsh
        run: ./skills/ceratops-skill-lifecycle/scripts/runtime/install-managed-skills.ps1 -InstallRoot (Join-Path $env:RUNNER_TEMP "ceratops-skills")

      - name: Validate skills
        run: python skills/ceratops-skill-lifecycle/scripts/validation/validate-skills-consistency.py --mode full

      - name: Smoke-test PR readiness helper script
        run: python skills/ceratops-gh-repo-lifecycle/scripts/github-validate-pr-readiness-contract.py --help
