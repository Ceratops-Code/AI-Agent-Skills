interface:
  display_name: "Ceratops Skill Lifecycle"
  short_description: "Create, adapt, update, audit, promote, and ship skills"
  icon_small: "./assets/ceratops-logo-500.png"
  icon_large: "./assets/ceratops-logo-500.png"
  default_prompt: "Use $ceratops-skill-lifecycle for this skill task. Select create, make-repo-compatible, update, skills-contract-review, skills-consistency-review, fast-change, change-promotion, or ship-to-remote as the narrowest action, update the right source of truth, and stop before promotion or shipping unless requested; new Ceratops skill creation in this repo promotes unless opted out."
